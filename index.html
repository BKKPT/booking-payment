<!DOCTYPE html>
<html>
<head>
  <title>Bangkok Partee Payment</title>

  <style>
    body{
      background:#636b2f;
      color:#435025;
      font-family:Arial;
      padding:20px;
    }

    .card{
      max-width:500px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:20px;
    }

    h1{
      color:#b87333;
      text-align:center;
    }

    .item{
      margin-bottom:15px;
    }

    .label{
      color:black;
      font-size:14px;
    }

    .value{
      font-size:18px;
      margin-top:5px;
    }

    button{
      width:100%;
      padding:15px;
      background:gold;
      border:none;
      border-radius:12px;
      font-weight:bold;
      margin-top:20px;
    }

    img{
      width:220px;
      display:block;
      margin:auto;
      margin-top:20px;
      border-radius:12px;
    }
  </style>
</head>

<body>

<div class="card">

<h1>Payment</h1>

<div class="item">
<div class="label">Booking ID</div>
<div class="value">VB-2026-001</div>
</div>

<div class="item">
<div class="label">Deposit Required</div>
<div class="value">THB 6,500</div>
</div>

<div class="item">
<div class="label">Remaining Balance</div>
<div class="value">THB 6,500</div>
</div>

<div class="item">
<div class="label">Status</div>
<div class="value">Pending Deposit Payment</div>
</div>

<img src="https://upload.wikimedia.org/wikipedia/commons/8/89/QR_code_example.svg">

<input type="file">

<button>
<script>

async function uploadSlip() {

  const fileInput = document.getElementById("slip");

  if (!fileInput.files.length) {
    alert("Please upload payment slip");
    return;
  }

  const file = fileInput.files[0];

  const reader = new FileReader();

  reader.onload = async function () {

    const base64 = reader.result.split(",")[1];

    const response = await fetch(
      "YOUR_GAS_WEBAPP_URL",
      {
        method: "POST",
        body: JSON.stringify({
          bookingId: "VB-2026-001",
          file: base64,
          fileName: file.name,
        }),
      }
    );

    const result = await response.text();

    alert("Upload Success");

    console.log(result);
  };

  reader.readAsDataURL(file);
}

</script>
  
</button>

</div>

</body>
</html>
